<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MONARK | Order Confirmation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />

    <style>
        .confirmation-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .check-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .order-details {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            text-align: left;
        }
    </style>
</head>

<body>

    <header>
        <div class="container-fluid container-fluid-custom px-4 px-lg-5 py-3 border-bottom bg-white">
            <div class="row align-items-center">
                <div class="col-6">
                    <a href="index.html">
                        <img src="logo_white.webp" alt="MONARK Logo" style="height: 40px" />
                    </a>
                </div>
                <div class="col-6 d-flex justify-content-end align-items-center gap-4">
                    <i class="fas fa-shopping-bag fs-5 nav-icon" id="cartIcon"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="confirmation-card">
                    <div class="check-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h2 class="fw-semibold">Thank You for Your Order!</h2>
                    <p class="text-muted mb-4">Your order has been placed successfully.</p>

                    <div class="order-details" id="orderDetails">
                        <div class="text-center py-3">
                            <div class="spinner-border text-warning"></div>
                            <p class="mt-2">Loading order details...</p>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a href="index.html" class="btn btn-dark">
                            <i class="fas fa-shopping-bag me-2"></i> Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="pt-5 pb-4 bg-dark text-white mt-5">
        <div class="container">
            <div class="text-center small text-white-50">
                © 2025 MONARK — Premium essentials. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/order-confirmation.js"></script>
    <script src="js/global.js"></script>
</body>

</html>
